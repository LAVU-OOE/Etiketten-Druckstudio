<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/assets/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="shortcut icon" href="/assets/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="LAVU-OOE" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="canonical" href="https://lavu-ooe.github.io/Etiketten-Druckstudio/app/">
    <title>Wird geladen...</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            background: #f0f4f8;
            color: #1a202c;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 820px;
            width: 100%;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07), 0 10px 15px rgba(0, 0, 0, 0.05);
            padding: 40px;
            transition: all 0.3s ease;
        }

        .loader {
            text-align: center;
            padding: 20px 0;
        }

        .loader h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .loader p {
            color: #718096;
            margin-top: 4px;
        }

        .spinner-container {
            display: flex;
            justify-content: center;
            margin: 24px 0;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #3182ce;
            border-radius: 50%;
            animation: spin 0.9s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
            100% { content: ''; }
        }

        .fallback {
            animation: fadeIn 0.4s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fallback h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .fallback .subtitle {
            color: #718096;
            margin-bottom: 20px;
        }

        .fallback hr {
            border: none;
            border-top: 2px solid #e2e8f0;
            margin: 20px 0;
        }

        .fallback pre {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.7;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #2d3748;
            max-height: 60vh;
            overflow-y: auto;
        }

        .fallback pre::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .fallback pre::-webkit-scrollbar-track {
            background: #edf2f7;
            border-radius: 3px;
        }

        .fallback pre::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 3px;
        }

        .fallback pre::-webkit-scrollbar-thumb:hover {
            background: #a0aec0;
        }

        .error-message {
            background: #fff5f5;
            border: 1px solid #feb2b2;
            border-radius: 8px;
            padding: 20px;
            color: #c53030;
        }

        .error-message strong {
            display: block;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 640px) {
            .container {
                padding: 24px 20px;
            }

            .loader h2 {
                font-size: 1.25rem;
            }

            .fallback h1 {
                font-size: 1.4rem;
            }

            .fallback pre {
                font-size: 0.8rem;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loader" class="loader" role="status" aria-live="polite">
            <h2>System wird geprüft<span class="dots"></span></h2>
            <p>Bitte warten, Sie werden weitergeleitet.</p>
            <div class="spinner-container">
                <div class="spinner" aria-hidden="true"></div>
            </div>
        </div>

        <div id="fallback" class="fallback hidden" role="document">
            <h1>📄 System-Dokumentation</h1>
            <p class="subtitle">Die Hauptanwendung konnte nicht geladen werden. Hier ist die technische Dokumentation:</p>
            <hr>
            <pre id="readme-content" aria-label="Dokumentation Inhalt">Lade Dokumentation...</pre>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const TARGET = 'app/index.html';
            const FALLBACK = 'README.md';
            const TIMEOUT_MS = 3000;

            let redirected = false;
            let fallbackLoaded = false;

            const loaderEl = document.getElementById('loader');
            const fallbackEl = document.getElementById('fallback');
            const readmeContent = document.getElementById('readme-content');

            const timeoutId = setTimeout(() => {
                if (!redirected && !fallbackLoaded) {
                    loadFallback('⏱️ Zeitüberschreitung: Die Hauptanwendung antwortet nicht.');
                }
            }, TIMEOUT_MS);

            fetch(TARGET, { method: 'HEAD', cache: 'no-cache' })
                .then(response => {
                    clearTimeout(timeoutId);

                    if (redirected) return;

                    if (response.ok) {
                        redirected = true;
                        const basePath = window.location.pathname.replace(/\/[^/]*$/, '');
                        const appPath = basePath + (basePath.endsWith('/') ? '' : '/') + 'app/';
                        window.location.replace(appPath);
                    } else {
                        loadFallback('Die Hauptanwendung ist nicht verfügbar (HTTP ' + response.status + ').');
                    }
                })
                .catch(err => {
                    clearTimeout(timeoutId);
                    if (!redirected && !fallbackLoaded) {
                        loadFallback('Netzwerkfehler: ' + err.message);
                    }
                });

            function loadFallback(reason) {
                if (fallbackLoaded || redirected) return;
                fallbackLoaded = true;
                clearTimeout(timeoutId);

                loaderEl.classList.add('hidden');
                fallbackEl.classList.remove('hidden');

                fetch(FALLBACK, { cache: 'no-cache' })
                    .then(res => {
                        if (res.ok) return res.text();
                        throw new Error('README.md nicht gefunden (HTTP ' + res.status + ')');
                    })
                    .then(text => {
                        readmeContent.textContent = text;
                    })
                    .catch(() => {
                        readmeContent.innerHTML = 
                            '<div class="error-message">' +
                                '<strong>⚠️ Dokumentation nicht verfügbar</strong>' +
                                '<p>Die <code>README.md</code> Datei konnte nicht geladen werden.</p>' +
                                '<p style="margin-top:8px;font-size:0.9rem;color:#718096;">' +
                                'Bitte versuchen Sie es später erneut oder kontaktieren Sie den Administrator.' +
                                '</p>' +
                            '</div>';
                    });

                if (reason) {
                    console.warn('[Fallback] ' + reason);
                }
            }

            window.addEventListener('beforeunload', function() {
                clearTimeout(timeoutId);
            });

        })();
    </script>
</body>
</html>
