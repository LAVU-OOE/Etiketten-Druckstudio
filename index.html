<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♻️ Entsorgungs-Frachtverwaltung Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f0f4f8;
            color: #1a2332;
            padding: 24px;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
        }

        body.dark-mode {
            background: #0d1117;
            color: #e6edf3;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-left h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-left .emoji-big {
            font-size: 32px;
            -webkit-text-fill-color: initial;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #eef2f6;
            color: #1a2332;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #5a6fd6 0%, #6a4292 100%);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .btn-outline:hover {
            background: #667eea;
            color: white;
        }

        .btn-dark {
            background: #1a2332;
            color: white;
        }

        .btn-dark:hover {
            background: #2d3a4f;
        }

        body.dark-mode .btn-dark {
            background: #e6edf3;
            color: #0d1117;
        }

        body.dark-mode .btn-dark:hover {
            background: #ffffff;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            transition: all 0.3s;
        }

        body.dark-mode .stat-card {
            background: #161b22;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }

        .stat-label {
            font-size: 13px;
            font-weight: 500;
            color: #6b7a8f;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        body.dark-mode .stat-label {
            color: #8b949e;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-top: 4px;
        }

        .stat-value .accent {
            color: #667eea;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            margin-bottom: 24px;
            transition: all 0.3s;
        }

        body.dark-mode .card {
            background: #161b22;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title .badge-count {
            background: #667eea;
            color: white;
            font-size: 12px;
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        /* Filter */
        .filter-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar input,
        .filter-bar select {
            padding: 10px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            background: white;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        body.dark-mode .filter-bar input,
        body.dark-mode .filter-bar select {
            background: #0d1117;
            border-color: #30363d;
            color: #e6edf3;
        }

        .filter-bar input:focus,
        .filter-bar select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        /* Tabelle */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        thead th {
            text-align: left;
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6b7a8f;
            border-bottom: 2px solid #eef2f6;
        }

        body.dark-mode thead th {
            color: #8b949e;
            border-bottom-color: #30363d;
        }

        tbody tr {
            background: #f8fafc;
            border-radius: 12px;
            transition: all 0.2s;
        }

        body.dark-mode tbody tr {
            background: #0d1117;
        }

        tbody tr:hover {
            background: #f1f5f9;
            transform: scale(1.01);
        }

        body.dark-mode tbody tr:hover {
            background: #1c2128;
        }

        tbody td {
            padding: 14px 16px;
            font-size: 14px;
            border-top: 1px solid transparent;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .status-offen {
            background: #fef3c7;
            color: #92400e;
        }

        .status-erledigt {
            background: #d1fae5;
            color: #065f46;
        }

        body.dark-mode .status-offen {
            background: #332d1a;
            color: #fbbf24;
        }

        body.dark-mode .status-erledigt {
            background: #1a332a;
            color: #34d399;
        }

        /* Etiketten Grid */
        .etikett-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .etikett-card {
            background: white;
            border-radius: 16px;
            padding: 18px;
            border: 2px solid #eef2f6;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        body.dark-mode .etikett-card {
            background: #0d1117;
            border-color: #30363d;
        }

        .etikett-card:hover {
            border-color: #667eea;
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.15);
        }

        .etikett-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .etikett-fracht {
            font-weight: 700;
            font-size: 16px;
            color: #667eea;
        }

        .etikett-nr {
            font-size: 12px;
            color: #6b7a8f;
            background: #f1f5f9;
            padding: 2px 10px;
            border-radius: 20px;
        }

        body.dark-mode .etikett-nr {
            background: #1c2128;
            color: #8b949e;
        }

        .etikett-material {
            font-size: 15px;
            font-weight: 500;
            margin: 4px 0;
        }

        .etikett-menge {
            font-size: 13px;
            color: #6b7a8f;
        }

        body.dark-mode .etikett-menge {
            color: #8b949e;
        }

        .etikett-status {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 2px dashed #eef2f6;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }

        body.dark-mode .etikett-status {
            border-top-color: #30363d;
        }

        .etikett-datum {
            color: #6b7a8f;
            font-size: 11px;
        }

        /* ============================================================
           MODAL mit Autocomplete
           ============================================================ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.35s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: white;
            border-radius: 28px;
            padding: 32px;
            max-width: 560px;
            width: 90%;
            transform: scale(0.9) translateY(20px);
            transition: all 0.35s ease;
            box-shadow: 0 40px 80px rgba(0,0,0,0.2);
            max-height: 90vh;
            overflow-y: auto;
        }

        body.dark-mode .modal {
            background: #161b22;
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #6b7a8f;
            transition: all 0.2s;
            padding: 0 8px;
        }

        .modal-close:hover {
            color: #ef4444;
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            background: white;
        }

        body.dark-mode .form-group input,
        body.dark-mode .form-group select {
            background: #0d1117;
            border-color: #30363d;
            color: #e6edf3;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        /* ============================================================
           AUTOCOMPLETE SUGGESTIONS
           ============================================================ */
        .suggestions-box {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #e2e8f0;
            border-top: none;
            border-radius: 0 0 12px 12px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1001;
            display: none;
            box-shadow: 0 12px 32px rgba(0,0,0,0.12);
        }

        body.dark-mode .suggestions-box {
            background: #0d1117;
            border-color: #30363d;
        }

        .suggestions-box.active {
            display: block;
        }

        .suggestion-item {
            padding: 10px 16px;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 14px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        body.dark-mode .suggestion-item {
            border-bottom-color: #1c2128;
        }

        .suggestion-item:hover,
        .suggestion-item.active {
            background: #f1f5f9;
        }

        body.dark-mode .suggestion-item:hover,
        body.dark-mode .suggestion-item.active {
            background: #1c2128;
        }

        .suggestion-item .highlight {
            font-weight: 600;
            color: #667eea;
        }

        .suggestion-item .suggestion-badge {
            font-size: 11px;
            color: #6b7a8f;
            background: #eef2f6;
            padding: 2px 10px;
            border-radius: 12px;
        }

        body.dark-mode .suggestion-item .suggestion-badge {
            background: #1c2128;
            color: #8b949e;
        }

        .suggestions-box .suggestion-empty {
            padding: 16px;
            text-align: center;
            color: #6b7a8f;
            font-size: 14px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        /* Print */
        @media print {
            body {
                background: white;
                padding: 12px;
            }
            .no-print {
                display: none !important;
            }
            .card {
                box-shadow: none;
                border: 1px solid #ddd;
                background: white;
            }
            .etikett-card {
                border-color: #999;
                break-inside: avoid;
                box-shadow: none;
            }
            .table-wrapper {
                overflow: visible;
            }
            tbody tr {
                background: white !important;
            }
            .stats-grid {
                display: none;
            }
            .header-actions {
                display: none;
            }
            .filter-bar {
                display: none;
            }
            .modal-overlay {
                display: none;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-left h1 {
                font-size: 20px;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .stat-value {
                font-size: 24px;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .btn {
                padding: 8px 14px;
                font-size: 12px;
            }
            .modal {
                padding: 20px;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #eef2f6;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }
        body.dark-mode ::-webkit-scrollbar-track {
            background: #1c2128;
        }
    </style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <span class="emoji-big">♻️</span>
            <h1>Entsorgungs-Frachtverwaltung</h1>
        </div>
        <div class="header-actions no-print">
            <button class="btn btn-primary" onclick="openModal('add')">➕ Position hinzufügen</button>
            <button class="btn btn-success" onclick="generateSampleData()">📦 Beispieldaten</button>
            <button class="btn btn-outline" onclick="printEtiketten()">🖨️ Etiketten</button>
            <button class="btn btn-dark" onclick="toggleDarkMode()">🌙</button>
        </div>
    </div>

    <!-- STATS -->
    <div class="stats-grid no-print" id="statsGrid">
        <div class="stat-card">
            <div class="stat-label">📦 Positionen</div>
            <div class="stat-value"><span id="totalPositions">0</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">🚚 Frachten</div>
            <div class="stat-value"><span id="totalFrachten">0</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">🔄 Offen</div>
            <div class="stat-value"><span class="accent" id="offenCount">0</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">✅ Erledigt</div>
            <div class="stat-value"><span class="accent" id="erledigtCount">0</span></div>
        </div>
    </div>

    <!-- FRACHTLISTE -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">
                📋 Frachtliste
                <span class="badge-count" id="frachtBadge">0</span>
            </div>
            <div class="filter-bar no-print">
                <input type="text" id="searchInput" placeholder="🔍 Suchen..." oninput="renderAll()">
                <select id="statusFilter" onchange="renderAll()">
                    <option value="alle">Alle Status</option>
                    <option value="offen">🔄 Offen</option>
                    <option value="erledigt">✅ Erledigt</option>
                </select>
            </div>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Fracht-ID</th>
                        <th>Positionen</th>
                        <th>Gesamtmenge</th>
                        <th>Status</th>
                        <th class="no-print">Aktion</th>
                    </tr>
                </thead>
                <tbody id="frachtTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- ETIKETTEN -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">
                🏷️ Etiketten
                <span class="badge-count" id="etikettBadge">0</span>
            </div>
        </div>
        <div id="etikettGrid" class="etikett-grid"></div>
    </div>

</div>

<!-- ============================================================
     MODAL mit Autocomplete
     ============================================================ -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">➕ Position hinzufügen</div>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div id="modalBody">
            <div class="form-group">
                <label>Positions-Nr.</label>
                <input type="number" id="editNr" placeholder="z.B. 1">
            </div>
            <div class="form-group">
                <label>Fracht-ID</label>
                <input type="text" id="editFracht" placeholder="z.B. F-2026-050" autocomplete="off">
                <div class="suggestions-box" id="frachtSuggestions"></div>
            </div>
            <div class="form-group">
                <label>Material / Beschreibung</label>
                <input type="text" id="editMaterial" placeholder="z.B. Elektroschrott" autocomplete="off">
                <div class="suggestions-box" id="materialSuggestions"></div>
            </div>
            <div class="form-group">
                <label>Menge</label>
                <input type="number" id="editMenge" placeholder="1" value="1">
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn" onclick="closeModal()">Abbrechen</button>
            <button class="btn btn-primary" id="modalSaveBtn" onclick="saveModal()">Hinzufügen</button>
        </div>
    </div>
</div>

<script>
    // ============================================================
    //  DATA LAYER
    // ============================================================
    let positions = JSON.parse(localStorage.getItem('entsorgung_positions')) || [];
    let modalMode = 'add';
    let editTargetNr = null;

    // Vordefinierte Material-Vorschläge (erweiterbar)
    const MATERIAL_SUGGESTIONS = [
        'Styropor', 'Bau-Styropor', 'EPS', 'XPS',
        'Elektroschrott', 'Kabel & Leitungen', 'Batterien',
        'Kunststoffteile', 'Metallschrott', 'Elektronikbauteile',
        'Verpackungsmaterial', 'Holzabfälle', 'Gipsplatten',
        'Dämmmaterial', 'Bitumen', 'Asbest (Sonderabfall)',
        'Leuchtstoffröhren', 'Ölfilter', 'Lacke & Farben',
        'Lösungsmittel', 'Säuren', 'Laugen',
        'Bauschutt', 'Erdaushub', 'Recyclingmaterial'
    ];

    function save() {
        localStorage.setItem('entsorgung_positions', JSON.stringify(positions));
        renderAll();
    }

    // ============================================================
    //  RENDER
    // ============================================================
    function renderAll() {
        const search = document.getElementById('searchInput')?.value?.toLowerCase() || '';
        const statusFilter = document.getElementById('statusFilter')?.value || 'alle';

        let filtered = positions.filter(p => {
            const matchSearch = p.fracht.toLowerCase().includes(search) ||
                p.material.toLowerCase().includes(search) ||
                String(p.nr).includes(search);
            const matchStatus = statusFilter === 'alle' || p.status === statusFilter;
            return matchSearch && matchStatus;
        });

        renderStats(filtered);
        renderFrachtliste(filtered);
        renderEtiketten(filtered);
    }

    function renderStats(filtered) {
        document.getElementById('totalPositions').textContent = filtered.length;
        const frachten = new Set(filtered.map(p => p.fracht));
        document.getElementById('totalFrachten').textContent = frachten.size;
        const offen = filtered.filter(p => p.status === 'offen').length;
        const erledigt = filtered.filter(p => p.status === 'erledigt').length;
        document.getElementById('offenCount').textContent = offen;
        document.getElementById('erledigtCount').textContent = erledigt;
    }

    function renderFrachtliste(filtered) {
        const gruppen = {};
        filtered.forEach(p => {
            if (!gruppen[p.fracht]) gruppen[p.fracht] = [];
            gruppen[p.fracht].push(p);
        });

        const tbody = document.getElementById('frachtTableBody');
        document.getElementById('frachtBadge').textContent = Object.keys(gruppen).length;

        if (Object.keys(gruppen).length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:40px;color:#6b7a8f;">Keine Frachten gefunden</td></tr>`;
            return;
        }

        let html = '';
        for (let [fracht, posListe] of Object.entries(gruppen)) {
            const alleErledigt = posListe.every(p => p.status === 'erledigt');
            const gesamtMenge = posListe.reduce((sum, p) => sum + p.menge, 0);
            const statusClass = alleErledigt ? 'status-erledigt' : 'status-offen';
            const statusLabel = alleErledigt ? '✅ Erledigt' : '🔄 Offen';

            html += `
                    <tr>
                        <td><strong>${fracht}</strong></td>
                        <td>${posListe.length}</td>
                        <td>${gesamtMenge}</td>
                        <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
                        <td class="no-print">
                            <button class="btn" style="padding:4px 12px;font-size:12px;" onclick="toggleFrachtStatus('${fracht}')">
                                ${alleErledigt ? '↩️ Wieder öffnen' : '✅ Als erledigt'}
                            </button>
                        </td>
                    </tr>
                `;
        }
        tbody.innerHTML = html;
    }

    function renderEtiketten(filtered) {
        const grid = document.getElementById('etikettGrid');
        document.getElementById('etikettBadge').textContent = filtered.length;

        if (filtered.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:#6b7a8f;">Keine Etiketten vorhanden</div>`;
            return;
        }

        let html = '';
        filtered.forEach(p => {
            const statusIcon = p.status === 'offen' ? '🔄' : '✅';
            const statusText = p.status === 'offen' ? 'offen' : 'erledigt';
            html += `
                    <div class="etikett-card">
                        <div class="etikett-header">
                            <span class="etikett-fracht">${p.fracht}</span>
                            <span class="etikett-nr">#${p.nr}</span>
                        </div>
                        <div class="etikett-material">${p.material}</div>
                        <div class="etikett-menge">📦 Menge: ${p.menge}</div>
                        <div class="etikett-status">
                            <span>${statusIcon} ${statusText}</span>
                            <span class="etikett-datum">${new Date().toLocaleDateString('de-DE')}</span>
                        </div>
                    </div>
                `;
        });
        grid.innerHTML = html;
    }

    // ============================================================
    //  ACTIONS
    // ============================================================
    function toggleFrachtStatus(fracht) {
        const allSame = positions.filter(p => p.fracht === fracht).every(p => p.status === 'erledigt');
        positions.forEach(p => {
            if (p.fracht === fracht) {
                p.status = allSame ? 'offen' : 'erledigt';
            }
        });
        save();
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    }

    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
    }

    // ============================================================
    //  AUTOCOMPLETE ENGINE
    // ============================================================
    function getMaterialSuggestions(input) {
        const query = input.toLowerCase().trim();
        if (!query) return [];

        // Aus vorhandenen Positionen + vordefinierter Liste
        const existing = new Set(positions.map(p => p.material));
        const allSources = [...new Set([...MATERIAL_SUGGESTIONS, ...existing])];

        // Filtern und nach Relevanz sortieren
        const scored = allSources.map(item => {
            const lower = item.toLowerCase();
            let score = 0;
            if (lower === query) score = 100;
            else if (lower.startsWith(query)) score = 50 + (query.length / lower.length) * 30;
            else if (lower.includes(query)) score = 20 + (query.length / lower.length) * 20;
            else score = 0;

            // Bonus für häufig verwendete Materialien
            const count = positions.filter(p => p.material === item).length;
            score += count * 2;

            return { item, score };
        });

        return scored
            .filter(s => s.score > 0)
            .sort((a, b) => b.score - a.score)
            .slice(0, 8)
            .map(s => s.item);
    }

    function getFrachtSuggestions(input) {
        const query = input.toLowerCase().trim();
        if (!query) return [];

        const existing = new Set(positions.map(p => p.fracht));
        const suggestions = [];

        // Vorhandene Fracht-IDs
        existing.forEach(f => {
            if (f.toLowerCase().includes(query)) {
                suggestions.push({ value: f, type: 'existing' });
            }
        });

        // Wenn keine passende existiert, Vorschlag für neue Fracht generieren
        if (suggestions.length === 0 && query.length >= 1) {
            // Muster erkennen: z.B. "F-2026" → "F-2026-001"
            const match = query.match(/^(F-)?(\d{4})?/i);
            if (match) {
                const year = match[2] || new Date().getFullYear();
                const prefix = match[1] || 'F-';
                // Höchste Nummer für dieses Jahr finden
                const existingNums = positions
                    .filter(p => p.fracht.includes(`${year}`))
                    .map(p => {
                        const num = parseInt(p.fracht.split('-').pop());
                        return isNaN(num) ? 0 : num;
                    });
                const nextNum = Math.max(0, ...existingNums) + 1;
                const newFracht = `${prefix}${year}-${String(nextNum).padStart(3, '0')}`;
                suggestions.push({ value: newFracht, type: 'new' });
            }
        }

        return suggestions.slice(0, 6);
    }

    // ============================================================
    //  SUGGESTIONS UI
    // ============================================================
    let activeSuggestionField = null;
    let suggestionIndex = -1;

    function showSuggestions(fieldId, suggestions, type) {
        const box = document.getElementById(fieldId === 'editMaterial' ? 'materialSuggestions' : 'frachtSuggestions');
        if (!box) return;

        if (!suggestions || suggestions.length === 0) {
            box.classList.remove('active');
            return;
        }

        let html = '';
        if (type === 'material') {
            suggestions.forEach((item, idx) => {
                const highlight = item;
                html += `
                        <div class="suggestion-item" data-index="${idx}" data-value="${item}" onclick="selectSuggestion('${fieldId}', '${item}')">
                            <span>${highlight}</span>
                            <span class="suggestion-badge">${positions.filter(p => p.material === item).length}×</span>
                        </div>
                    `;
            });
        } else {
            suggestions.forEach((s, idx) => {
                const label = s.type === 'new' ? '🆕 Neu' : '📁 Vorhanden';
                html += `
                        <div class="suggestion-item" data-index="${idx}" data-value="${s.value}" onclick="selectSuggestion('${fieldId}', '${s.value}')">
                            <span>${s.value}</span>
                            <span class="suggestion-badge">${label}</span>
                        </div>
                    `;
            });
        }

        box.innerHTML = html;
        box.classList.add('active');
        suggestionIndex = -1;
        activeSuggestionField = fieldId;
    }

    function selectSuggestion(fieldId, value) {
        document.getElementById(fieldId).value = value;
        const box = document.getElementById(fieldId === 'editMaterial' ? 'materialSuggestions' : 'frachtSuggestions');
        if (box) box.classList.remove('active');
        // Automatisch das andere Feld prüfen (z.B. wenn Material geändert wird, Fracht vorschlagen)
        if (fieldId === 'editMaterial') {
            const frachtInput = document.getElementById('editFracht');
            if (frachtInput && !frachtInput.value) {
                const frachtSuggest = getFrachtSuggestions(frachtInput.value || '');
                showSuggestions('editFracht', frachtSuggest, 'fracht');
            }
        }
    }

    // Event-Handler für Autocomplete
    function setupAutocomplete(fieldId, type) {
        const input = document.getElementById(fieldId);
        if (!input) return;

        // Eingabe
        input.addEventListener('input', function() {
            const val = this.value;
            let suggestions = [];
            if (type === 'material') {
                suggestions = getMaterialSuggestions(val);
                showSuggestions(fieldId, suggestions, 'material');
            } else {
                suggestions = getFrachtSuggestions(val);
                showSuggestions(fieldId, suggestions, 'fracht');
            }
        });

        // Tastatur-Navigation
        input.addEventListener('keydown', function(e) {
            const box = document.getElementById(fieldId === 'editMaterial' ? 'materialSuggestions' : 'frachtSuggestions');
            if (!box || !box.classList.contains('active')) return;

            const items = box.querySelectorAll('.suggestion-item');
            if (items.length === 0) return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                suggestionIndex = Math.min(suggestionIndex + 1, items.length - 1);
                updateActiveSuggestion(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                suggestionIndex = Math.max(suggestionIndex - 1, -1);
                updateActiveSuggestion(items);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (suggestionIndex >= 0 && items[suggestionIndex]) {
                    const val = items[suggestionIndex].dataset.value;
                    selectSuggestion(fieldId, val);
                }
            } else if (e.key === 'Escape') {
                box.classList.remove('active');
            }
        });

        // Fokus verliert → Vorschläge ausblenden (mit Verzögerung für Klicks)
        input.addEventListener('blur', function() {
            setTimeout(() => {
                const box = document.getElementById(fieldId === 'editMaterial' ? 'materialSuggestions' : 'frachtSuggestions');
                if (box) box.classList.remove('active');
            }, 200);
        });

        // Fokus → Vorschläge anzeigen, wenn bereits Text vorhanden
        input.addEventListener('focus', function() {
            if (this.value.trim().length > 0) {
                const val = this.value;
                let suggestions = [];
                if (type === 'material') {
                    suggestions = getMaterialSuggestions(val);
                    showSuggestions(fieldId, suggestions, 'material');
                } else {
                    suggestions = getFrachtSuggestions(val);
                    showSuggestions(fieldId, suggestions, 'fracht');
                }
            }
        });
    }

    function updateActiveSuggestion(items) {
        items.forEach((el, idx) => {
            el.classList.toggle('active', idx === suggestionIndex);
        });
        if (suggestionIndex >= 0 && items[suggestionIndex]) {
            items[suggestionIndex].scrollIntoView({ block: 'nearest' });
        }
    }

    // ============================================================
    //  MODAL
    // ============================================================
    function openModal(mode, nr = null) {
        modalMode = mode;
        const overlay = document.getElementById('modalOverlay');
        const title = document.getElementById('modalTitle');
        const saveBtn = document.getElementById('modalSaveBtn');

        if (mode === 'add') {
            title.textContent = '➕ Position hinzufügen';
            saveBtn.textContent = 'Hinzufügen';
            document.getElementById('editNr').value = positions.length + 1;
            document.getElementById('editFracht').value = '';
            document.getElementById('editMaterial').value = '';
            document.getElementById('editMenge').value = 1;
            editTargetNr = null;

            // Vorschläge für Fracht basierend auf leerem Feld
            setTimeout(() => {
                const frachtSuggest = getFrachtSuggestions('');
                if (frachtSuggest.length > 0) {
                    showSuggestions('editFracht', frachtSuggest, 'fracht');
                }
            }, 300);
        } else if (mode === 'edit' && nr !== null) {
            const pos = positions.find(p => p.nr === nr);
            if (!pos) return;
            title.textContent = '✏️ Position bearbeiten';
            saveBtn.textContent = 'Speichern';
            document.getElementById('editNr').value = pos.nr;
            document.getElementById('editFracht').value = pos.fracht;
            document.getElementById('editMaterial').value = pos.material;
            document.getElementById('editMenge').value = pos.menge;
            editTargetNr = nr;
        }

        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';

        // Autocomplete initialisieren (nachdem Modal sichtbar)
        setTimeout(() => {
            setupAutocomplete('editMaterial', 'material');
            setupAutocomplete('editFracht', 'fracht');
        }, 100);
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
        document.body.style.overflow = 'auto';
        // Vorschläge ausblenden
        document.getElementById('materialSuggestions').classList.remove('active');
        document.getElementById('frachtSuggestions').classList.remove('active');
    }

    function saveModal() {
        const nr = parseInt(document.getElementById('editNr').value);
        const fracht = document.getElementById('editFracht').value.trim();
        const material = document.getElementById('editMaterial').value.trim();
        const menge = parseInt(document.getElementById('editMenge').value) || 1;

        if (!fracht) {
            alert('Bitte eine Fracht-ID eingeben oder aus den Vorschlägen wählen.');
            return;
        }
        if (!material) {
            alert('Bitte ein Material eingeben oder aus den Vorschlägen wählen.');
            return;
        }

        if (modalMode === 'add') {
            if (positions.some(p => p.nr === nr)) {
                alert('Positions-Nr. existiert bereits.');
                return;
            }
            positions.push({ nr, fracht, material, menge, status: 'offen' });
        } else if (modalMode === 'edit' && editTargetNr !== null) {
            const idx = positions.findIndex(p => p.nr === editTargetNr);
            if (idx !== -1) {
                positions[idx] = { ...positions[idx], nr, fracht, material, menge };
            }
        }

        closeModal();
        save();
    }

    // Klick außerhalb Modal schließen
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // ESC
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });

    // ============================================================
    //  SAMPLE DATA
    // ============================================================
    function generateSampleData() {
        if (positions.length > 0 && !confirm('Beispieldaten laden? Vorhandene Daten werden überschrieben.')) return;

        const sample = [];
        const frachten = ['F-2026-042', 'F-2026-043', 'F-2026-044', 'F-2026-045', 'F-2026-046'];
        const materialien = [
            'Elektroschrott', 'Kabel & Leitungen', 'Batterien',
            'Styropor', 'Bau-Styropor', 'Kunststoffteile',
            'Metallschrott', 'Elektronikbauteile', 'Verpackungsmaterial',
            'Holzabfälle', 'Gipsplatten', 'Dämmmaterial'
        ];
        for (let i = 1; i <= 50; i++) {
            sample.push({
                nr: i,
                fracht: frachten[i % frachten.length],
                material: materialien[i % materialien.length],
                menge: Math.floor(Math.random() * 12) + 1,
                status: i % 3 === 0 ? 'erledigt' : 'offen'
            });
        }
        positions = sample;
        save();
    }

    // ============================================================
    //  PRINT
    // ============================================================
    function printEtiketten() {
        window.print();
    }

    // ============================================================
    //  INIT
    // ============================================================
    renderAll();

    // Strg+N → Modal öffnen
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
            e.preventDefault();
            openModal('add');
        }
    });
</script>
