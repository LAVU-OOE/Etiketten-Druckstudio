<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LAVU OÖ - Etiketten-Druckstudio v8 (HERMA 4473)</title>
    <link class="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1a4b60" />
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 20px;
            color: #2c3e50;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
        }

        .crd {
            background: #ffffff;
            width: 100%;
            max-width: 750px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 30px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-top: 0;
            color: #1a4b60;
            border-bottom: 2px solid #eef2f5;
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: #34495e;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccd1d9;
            border-radius: 8px;
            font-size: 15px;
            background-color: #fff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #1a4b60;
            box-shadow: 0 0 0 3px rgba(26, 75, 96, 0.15);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-primary { background: #1a4b60; color: white; }
        .btn-primary:hover { background: #113240; }
        .btn-secondary { background: #e0e6ed; color: #3c4858; }
        .btn-secondary:hover { background: #d0d7de; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }

        /* PWA Banner Styles */
        #pwaBanner {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c3e50;
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: none;
            align-items: center;
            gap: 15px;
            z-index: 1000;
            width: 90%;
            max-width: 500px;
            justify-content: space-between;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            opacity: 1;
            visibility: visible;
        }

        /* Klasse für den automatischen Fade-out bei Interaktion */
        #pwaBanner.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        #pwaBanner p { margin: 0; font-size: 14px; }
        #b3 { background: #27ae60; color: white; padding: 8px 15px; border-radius: 20px; font-size: 13px; }
        #b3:hover { background: #219653; }

        #n1 {
            font-size: 13px;
            margin-top: 5px;
            font-weight: 500;
        }

        /* Druck-Spezifisches Layout für HERMA 4473 (70x42.3mm) */
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0 !important;
            }
            .crd, #pwaBanner, #b1, #b2 {
                display: none !important;
            }
            .psh {
                display: block !important;
                width: 210mm;
                height: 297mm;
                page-break-after: always;
                box-sizing: border-box;
                padding-top: 0.5mm; /* Präzise Ausrichtung für HERMA 4473 */
                padding-left: 0mm;
            }
            .row {
                display: flex;
                width: 210mm;
                height: 42.3mm;
            }
            .lbl {
                width: 70mm;
                height: 42.3mm;
                box-sizing: border-box;
                border: 1px dashed #ddd; /* Nur als Schneidehilfe im Entwurf, kann auf 'none' gesetzt werden */
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                align-items: center;
                padding: 4mm 5mm;
                text-align: center;
                overflow: hidden;
            }
            .lbl-top { font-size: 14pt; font-weight: bold; color: #1a4b60; }
            .lbl-mid { font-size: 11pt; font-weight: normal; margin: 2mm 0; }
            .lbl-bot { font-size: 16pt; font-weight: bold; background: #f4f7f9; width: 100%; padding: 1mm 0; border-radius: 4px; }
        }

        @media screen {
            .psh { display: none; }
        }
    </style>
</head>
<body>

    <div class="crd">
        <h1>🖨️ LAVU OÖ Etiketten-Studio <span style="font-size: 14px; color: #7f8c8d;">v8</span></h1>
        
        <div class="grid-2">
            <div class="form-group">
                <label for="s2">1. Artikel aus dem Sortiment wählen:</label>
                <select id="s2" onchange="r1()"></select>
            </div>
            <div class="form-group">
                <label for="i2">2. Anzahl der Etiketten:</label>
                <input type="number" id="i2" value="1" min="1" max="24" />
            </div>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label for="i3">Startposition auf dem Bogen (1-24):</label>
                <input type="number" id="i3" value="1" min="1" max="24" />
            </div>
            <div class="form-group">
                <label for="i4">GitHub Sortiment JSON URL:</label>
                <input type="text" id="i4" placeholder="https://..." />
                <div id="n1">Status: Prüfe Verbindung...</div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-primary" id="b1" onclick="window.print()">In Druckvorschau öffnen</button>
            <button class="btn-secondary" id="b2" onclick="f1()">GitHub Datenbank synchronisieren</button>
        </div>
    </div>

    <div class="crd">
        <h2 style="font-size: 18px; margin-top:0; color:#2c3e50;">✏️ Artikel bearbeiten / neu anlegen</h2>
        <input type="hidden" id="e1" value="-1" />
        
        <div class="grid-2">
            <div class="form-group">
                <label for="c1">Artikel-Nummer:</label>
                <input type="text" id="c1" placeholder="z.B. 10234" />
            </div>
            <div class="form-group">
                <label for="c2">Zusatzzeile Mitte (optional):</label>
                <input type="text" id="c2" placeholder="z.B. 500g Becher" />
            </div>
        </div>
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label for="c3">Bezeichnung (Hauptzeile):</label>
            <input type="text" id="c3" placeholder="z.B. Bio-Heumilch Topfen" />
        </div>

        <div class="btn-group">
            <button class="btn-primary" onclick="s5()">Speichern / Aktualisieren</button>
            <button class="btn-secondary" onclick="c3()">Formular leeren</button>
            <button class="btn-danger" id="b-del" onclick="const idx = document.getElementById('s2').value; if(idx !== '') d1(parseInt(idx));" style="display:none;">Diesen Artikel löschen</button>
        </div>
    </div>

    <div id="pwaBanner">
        <p>LAVU Etiketten-Studio als App installieren für Offline-Nutzung im ASZ?</p>
        <button id="b3">Installieren</button>
    </div>

    <div id="p1"></div>

    <script>
        // Fallback Standard-Sortiment falls kein GitHub/Cache verfügbar ist
        const a1 = [
            { artNr: "1001", bez: "Mischkompost gesiebt", zusatzMitte: "Kategorie A+" },
            { artNr: "1002", bez: "Rindenmulch fein", zusatzMitte: "0-20mm Sackware" },
            { artNr: "1003", bez: "Erde-Sand-Gemisch", zusatzMitte: "Rasen-Spezial" }
        ];

        let a2 = []; // Aktives Sortiment
        let a57 = null; // PWA Install Prompt

        window.addEventListener('DOMContentLoaded', async () => {
            s7(); // Initialisiere Druckbogen-Gerüst
            
            let a4 = localStorage.getItem('lavu_sortiment_url');
            if (!a4) {
                a4 = "https://raw.githubusercontent.com/LAVU-OOE/Etiketten-Druckstudio/refs/heads/main/sortiment.json";
                localStorage.setItem('lavu_sortiment_url', a4);
            }
            
            document.getElementById('i4').value = a4;
            document.getElementById('n1').innerHTML = `⏳ Verbinde...`;
            document.getElementById('n1').style.color = '#f39c12';
            
            await f2();
            u1(); // Startposition und Event-Listener für Änderungen überwachen
            setupBannerAutohide(); // Automatischen Banner-Fadeout initialisieren
        });

        // Holt die Daten entweder von GitHub oder aus dem lokalen Cache
        async function f2() {
            const a4 = localStorage.getItem('lavu_sortiment_url');
            if (a4) {
                try {
                    const a5 = await fetch(a4, { cache: "no-store" });
                    if (!a5.ok) throw new Error("Netzwerkantwort war fehlerhaft");
                    const a6 = await a5.json();
                    if (Array.isArray(a6) && a6.length > 0) {
                        a2 = a6;
                        localStorage.setItem('lavu_studio_sortiment_v8', JSON.stringify(a2));
                        document.getElementById('n1').innerHTML = `🟢 Verbunden mit GitHub-Repository`;
                        document.getElementById('n1').style.color = '#27ae60';
                        renderDropdownOptions();
                        return;
                    }
                } catch (e) {
                    console.warn("Fehler beim Laden von GitHub URL, weiche auf cache / localStorage aus.", e);
                    document.getElementById('n1').innerHTML = `⚠️ GitHub Offline! Lokaler Cache geladen.`;
                    document.getElementById('n1').style.color = '#e74c3c';
                }
            }

            const a7 = localStorage.getItem('lavu_studio_sortiment_v8');
            if (a7) {
                try {
                    a2 = JSON.parse(a7);
                } catch(e) {
                    a2 = [...a1];
                }
            } else {
                a2 = [...a1];
            }
            renderDropdownOptions();
        }

        // Aktualisiert die URL der GitHub-Datenbank
        async function f1() {
            const a8 = document.getElementById('i4').value.trim();
            if (!a8) {
                localStorage.removeItem('lavu_sortiment_url');
                document.getElementById('n1').innerHTML = `Status: Rein lokaler Modus (localStorage)`;
                document.getElementById('n1').style.color = '#7f8c8d';
                a2 = [...a1];
                localStorage.setItem('lavu_studio_sortiment_v8', JSON.stringify(a2));
                renderDropdownOptions();
                p1();
                alert("Verlinkung entfernt. Standard-Sortiment geladen.");
                return;
            }

            let a9 = a8;
            if (a9.includes("github.com") && !a9.includes("raw.githubusercontent.com")) {
                a9 = a9.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
                document.getElementById('i4').value = a9;
            }

            localStorage.setItem('lavu_sortiment_url', a9);
            document.getElementById('n1').innerHTML = `⏳ Verbinde...`;
            document.getElementById('n1').style.color = '#f39c12';
            await f2();
        }

        // Baut das Dropdown-Menü basierend auf der aktuellen Artikelliste um
        function renderDropdownOptions() {
            const a10 = document.getElementById('s2');
            const a11 = a10.value;
            a10.innerHTML = '';

            a2.forEach((a12, a13) => {
                const a14 = document.createElement('option');
                a14.value = a13;
                a14.textContent = `${a12.artNr} - ${a12.bez}`;
                a10.appendChild(a14);
            });

            if (a11 !== "" && parseInt(a11) < a2.length) {
                a10.value = a11;
            } else {
                a10.value = "0";
            }
            
            r1();
        }

        // Erstellt die leeren Bogen-Seiten im Hintergrund für den Druck
        function s7() {
            const container = document.getElementById('p1');
            container.innerHTML = '';
            
            // Wir erstellen vorab Struktur für 2 Seiten (falls Startposition + Menge über 24 Etiketten geht)
            for (let page = 0; page < 2; page++) {
                const psh = document.createElement('div');
                psh.className = 'psh';
                psh.id = `page-${page}`;
                
                for (let r = 0; r < 8; r++) { // 8 Reihen à 3 Spalten = 24 Etiketten pro Bogen
                    const row = document.createElement('div');
                    row.className = 'row';
                    for (let c = 0; c < 3; c++) {
                        const lbl = document.createElement('div');
                        lbl.className = 'lbl';
                        lbl.id = `l-${page}-${(r * 3) + c}`;
                        row.appendChild(lbl);
                    }
                    psh.appendChild(row);
                }
                container.appendChild(psh);
            }
        }

        // Füllt den Druckbogen basierend auf Selektion, Anzahl und Startposition
        function p1() {
            // Zuerst alle Etiketten-Felder leeren
            document.querySelectorAll('.lbl').forEach(el => el.innerHTML = '');
            
            const idx = parseInt(document.getElementById('s2').value);
            if (isNaN(idx) || !a2[idx]) return;

            const item = a2[idx];
            const count = parseInt(document.getElementById('i2').value) || 1;
            const startPos = (parseInt(document.getElementById('i3').value) || 1) - 1; // 0-indiziert

            let currentPos = startPos;

            for (let i = 0; i < count; i++) {
                const pageIndex = Math.floor(currentPos / 24);
                const labelIndex = currentPos % 24;

                const targetCell = document.getElementById(`l-${pageIndex}-${labelIndex}`);
                if (targetCell) {
                    targetCell.innerHTML = `
                        <div class="lbl-top">${item.bez}</div>
                        <div class="lbl-mid">${item.zusatzMitte || '&nbsp;'}</div>
                        <div class="lbl-bot">${item.artNr}</div>
                    `;
                }
                currentPos++;
            }
        }

        // Lädt die Daten des gewählten Dropdown-Artikels in die Bearbeitungsmaske
        function r1() {
            const idx = parseInt(document.getElementById('s2').value);
            if (isNaN(idx) || !a2[idx]) {
                c3();
                return;
            }
            const item = a2[idx];
            document.getElementById('c1').value = item.artNr;
            document.getElementById('c2').value = item.zusatzMitte || '';
            document.getElementById('c3').value = item.bez;
            document.getElementById('e1').value = idx;
            document.getElementById('b-del').style.display = 'inline-block';
            p1();
        }

        // Setzt das Bearbeitungsformular zurück
        document.getElementById('i2').addEventListener('input', p1);
        document.getElementById('i3').addEventListener('input', p1);
        function u1() {
            document.getElementById('i2').addEventListener('input', p1);
            document.getElementById('i3').addEventListener('input', p1);
        }

        function c3() {
            document.getElementById('c1').value = '';
            document.getElementById('c2').value = '';
            document.getElementById('c3').value = '';
            document.getElementById('e1').value = '-1';
            document.getElementById('b-del').style.display = 'none';
        }

        // Speichert einen neuen Artikel oder updatet den bestehenden
        function s5() {
            const artNr = document.getElementById('c1').value.trim();
            const zusatz = document.getElementById('c2').value.trim();
            const bez = document.getElementById('c3').value.trim();
            const editIdx = parseInt(document.getElementById('e1').value);

            if (!artNr || !bez) {
                alert("Artikel-Nr. und Bezeichnung sind erforderlich!");
                return;
            }

            const itemData = { artNr: artNr, bez: bez, zusatzMitte: zusatz };

            if (editIdx > -1) {
                a2[editIdx] = itemData;
            } else {
                a2.push(itemData);
            }

            localStorage.setItem('lavu_studio_sortiment_v8', JSON.stringify(a2));
            renderDropdownOptions();
            c3();
            p1();
        }

        // Löscht einen Artikel aus dem Sortiment
        function d1(idx) {
            if (isNaN(idx) || !a2[idx]) return;
            if (confirm(`Möchten Sie den Artikel "${a2[idx].bez}" wirklich aus der Datenbank löschen?`)) {
                a2.splice(idx, 1);
                localStorage.setItem('lavu_studio_sortiment_v8', JSON.stringify(a2));
                renderDropdownOptions();
                c3();
                p1();
            }
        }

        // Funktion, die das Banner bei der ersten echten Benutzerinteraktion sanft ausblendet
        function setupBannerAutohide() {
            const banner = document.getElementById('pwaBanner');
            if (!banner) return;

            const interactionEvents = ['mousedown', 'mousemove', 'keydown', 'touchstart', 'scroll'];

            function hideBanner() {
                // CSS-Klasse für Opacity/Visibility-Wechsel triggern
                banner.classList.add('fade-out');

                // Nach Ablauf der 500ms Transition komplett unsichtbar schalten
                setTimeout(() => {
                    banner.style.display = 'none';
                }, 500);

                // Listener sofort abbauen
                interactionEvents.forEach(eventType => {
                    window.removeEventListener(eventType, hideBanner);
                });
            }

            // Kurze Schonfrist von 1.5s nach dem Laden, um Fehl-Trigger beim Seitenaufbau zu vermeiden
            setTimeout(() => {
                interactionEvents.forEach(eventType => {
                    window.addEventListener(eventType, hideBanner, { passive: true });
                });
            }, 1500);
        }

        // SERVICE WORKER & PWA LOGIK
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log('Service Worker erfolgreich registriert.');
            }).catch(err => console.error('SW Registration fehlgeschlagen:', err));

            let a61 = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!a61) {
                    a61 = true;
                    window.location.reload(true);
                }
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            a57 = e;
            const banner = document.getElementById('pwaBanner');
            if (banner && !banner.classList.contains('fade-out')) {
                banner.style.display = 'flex';
            }
        });

        const installBtn = document.getElementById('b3');
        if (installBtn) {
            installBtn.addEventListener('click', () => {
                if (a57) {
                    a57.prompt();
                    a57.userChoice.then((choice) => {
                        if (choice.outcome === 'accepted') {
                            console.log('User hat die Installation akzeptiert.');
                        }
                        const banner = document.getElementById('pwaBanner');
                        if (banner) banner.style.display = 'none';
                        a57 = null;
                    });
                }
            });
        }
        
        window.addEventListener('appinstalled', () => {
            console.log('LAVU Etiketten-Druckstudio wurde erfolgreich installiert.');
            const banner = document.getElementById('pwaBanner');
            if (banner) banner.style.display = 'none';
        });
    </script>
</body>
</html>
