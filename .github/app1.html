<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LAVU OÖ - Etiketten-Druckstudio v8 (HERMA 4473)</title>
    <link class="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1a4b60" />
    <style>
        /* ==========================================
           BENUTZEROBERFLÄCHE (Wird nicht gedruckt)
           ========================================== */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 10px 20px 20px 20px;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .main-card {
            background: #ffffff;
            width: 100%;
            max-width: 750px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(26, 75, 96, 0.08);
            padding: 35px;
            border: 1px solid #eef2f5;
        }

        /* App-Header */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eef2f5;
            padding-bottom: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .app-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .app-logo {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #1a4b60;
            box-shadow: 0 2px 8px rgba(26, 75, 96, 0.15);
        }

        .app-header-title {
            color: #1a4b60;
            font-size: 1.5rem;
            font-weight: bold;
            line-height: 1.1;
        }

        .app-header-subtitle {
            font-size: 0.85rem;
            color: #6cb4db;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-top: 3px;
        }

        .app-header-right {
            color: #27ae60;
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #e8f8f5;
            padding: 8px 16px;
            border-radius: 8px;
            border-left: 4px solid #27ae60;
            box-shadow: 0 2px 6px rgba(39, 174, 96, 0.04);
            white-space: nowrap;
        }

        /* Dashboard */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 35px;
            align-items: center;
            margin-bottom: 30px;
        }

        .preview-sidebar {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            border: 1px dashed #cbd5e1;
            width: 100%;
        }

        .sidebar-title {
            font-size: 0.75rem;
            font-weight: bold;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .thumbnail-wrapper {
            position: relative;
            width: 168px;
            height: 238px;
            border: 1px solid #cbd5e1;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .thumbnail-wrapper:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 24px rgba(26, 75, 96, 0.15);
            border-color: #1a4b60;
        }

        .scaled-sheet-container {
            transform: scale(0.20);
            transform-origin: top left;
            width: 210mm;
            height: 297mm;
            pointer-events: none;
        }

        .thumbnail-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 75, 96, 0.9);
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            text-align: center;
            padding: 8px 0;
            transition: background 0.2s;
            backdrop-filter: blur(2px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .thumbnail-wrapper:hover .thumbnail-overlay {
            background: rgba(39, 174, 96, 0.95);
        }

        #labelSheetModal .label {
            cursor: pointer !important;
            transition: background-color 0.15s ease, border-color 0.15s ease;
        }
        #labelSheetModal .label:hover {
            background-color: #e8f8f5 !important;
            border-color: #27ae60 !important;
        }
        #labelSheetModal .label.empty:hover {
            background-color: #f1f5f9 !important;
            border-color: #1a4b60 !important;
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            width: 100%;
        }

        .frontpage-selection {
            margin-bottom: 22px;
            display: flex;
            flex-direction: column;
        }

        .frontpage-selection label {
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ==========================================
           INTERAKTIVES SELECTION WHEEL STYLING
           ========================================== */
        .wheel-container {
            position: relative;
            display: flex;
            align-items: center;
            height: 60px;
            border: 2px solid #6cb4db;
            border-radius: 12px;
            background-color: #fff;
            box-shadow: 0 4px 12px rgba(108, 180, 219, 0.1);
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE/Edge */
            padding: 0 40%;
        }

        .wheel-container::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .wheel-item {
            flex: 0 0 auto;
            width: 100%;
            max-width: 260px;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 600;
            color: #7f8c8d;
            scroll-snap-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            user-select: none;
            padding: 0 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .wheel-item.active {
            color: #1a4b60;
            font-size: 1.1rem;
            font-weight: 800;
            transform: scale(1.05);
        }

        /* Center Indicator Overlay lines */
        .wheel-overlay-line {
            position: absolute;
            left: 50%;
            top: 10%;
            bottom: 10%;
            width: 270px;
            transform: translateX(-50%);
            border-left: 2px dashed rgba(26, 75, 96, 0.15);
            border-right: 2px dashed rgba(26, 75, 96, 0.15);
            pointer-events: none;
            border-radius: 6px;
            background: rgba(108, 180, 219, 0.04);
        }

        .summary-box {
            background: #f8fafc;
            border-left: 4px solid #6cb4db;
            padding: 16px 20px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 25px;
            border-top: 1px solid #e2e8f0;
            border-right: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
            width: 100%;
        }

        .summary-item {
            margin-bottom: 8px;
            font-size: 1rem;
            color: #334155;
            word-break: break-word;
        }
        .summary-item:last-child {
            margin-bottom: 0;
        }
        .summary-label {
            font-weight: 600;
            color: #1a4b60;
            width: 110px;
            display: inline-block;
            flex-shrink: 0;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        button {
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background-color: #27ae60;
            color: white;
            flex: 2;
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.2);
        }

        .btn-primary:hover {
            background-color: #219653;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(39, 174, 96, 0.25);
        }

        .btn-secondary {
            background-color: #1a4b60;
            color: white;
            flex: 1;
            box-shadow: 0 4px 12px rgba(26, 75, 96, 0.15);
        }

        .btn-secondary:hover {
            background-color: #113342;
            transform: translateY(-1px);
        }

        .btn-crud {
            padding: 10px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        /* Modals */
        .modal-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 34, 43, 0.55);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease;
            padding: 10px;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 580px;
            box-shadow: 0 20px 40px rgba(15, 34, 43, 0.2);
            position: relative;
            max-height: 95vh;
            overflow-y: auto;
        }

        .preview-modal-content {
            width: 100vw;
            height: 100vh;
            max-width: 100% !important;
            max-height: 100% !important;
            border-radius: 0 !important;
            display: flex;
            flex-direction: column;
            padding: 20px 30px;
            width: 100%;
            overflow: hidden;
        }

        .modal-body-scroll {
            overflow: hidden;
            flex: 1;
            padding: 25px;
            background: #f1f5f9;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        .modal-header {
            font-size: 1.35rem;
            font-weight: bold;
            color: #1a4b60;
            margin-bottom: 20px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .btn-close-x {
            background: transparent;
            font-size: 1.8rem;
            color: #94a3b8;
            padding: 0;
            cursor: pointer;
            line-height: 1;
        }
        .btn-close-x:hover {
            color: #ef4444;
        }

        .mode-switcher {
            display: flex;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            flex-wrap: wrap;
            gap: 4px;
        }

        .mode-tab {
            flex: 1;
            min-width: 120px;
            text-align: center;
            padding: 10px 15px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .mode-tab.active {
            background: #1a4b60;
            color: white;
            box-shadow: 0 2px 6px rgba(26, 75, 96, 0.15);
        }

        .form-section {
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .form-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        input,
        select {
            padding: 11px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.95rem;
            color: #334155;
            background-color: #f8fafc;
            transition: all 0.2s;
            width: 100%;
            max-width: 100%;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #6cb4db;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(108, 180, 219, 0.15);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 20px;
            border-top: 1px solid #f1f5f9;
            padding-top: 15px;
            flex-wrap: wrap;
        }

        .btn-save-defaults {
            background-color: #3498db;
            color: white;
        }
        .btn-save-defaults:hover {
            background-color: #2980b9;
        }

        .btn-cancel {
            background-color: #f1f5f9;
            color: #475569;
        }
        .btn-cancel:hover {
            background-color: #e2e8f0;
        }

        .crud-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.85rem;
        }
        .crud-item-row:last-child {
            border-bottom: none;
        }
        .crud-item-info {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 10px;
        }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .main-card { padding: 20px; }
            .dashboard-grid { grid-template-columns: 1fr; gap: 25px; }
            .preview-sidebar { order: -1; }
        }

        @media (max-width: 520px) {
            .app-header { flex-direction: column; align-items: flex-start; }
            .app-header-right { width: 100%; justify-content: center; }
            .action-buttons { flex-direction: column; }
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
            .modal-content { padding: 20px; }
            .modal-footer button { width: 100%; }
        }

        .preview-modal-content {
            max-width: 90vw;
            width: 600px;
            max-height: 95vh;
            display: flex;
            flex-direction: column;
            padding: 20px 30px;
        }

        .modal-body-scroll {
            flex: 1;
            padding: 25px;
            background: #f1f5f9;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow: hidden;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.05);
            container-type: inline-size;
        }

        .page-container {
            background: #ffffff;
            width: 210mm;
            height: 297mm;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.12);
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .print-sheet {
            width: 210mm;
            height: 297mm;
            box-sizing: border-box;
            padding: 5mm 0mm 5mm 0mm;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(7, 1fr);
            gap: 0;
            background: white;
        }

        @container (min-width: 794px) {
            .page-container { transform: scale(1); }
        }

        .label {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            padding: 3.5mm 4mm 3.5mm 4mm;
            border: 1px dashed #cbd5e1;
            position: relative;
            background: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .label-top {
            font-size: 7pt;
            font-weight: bold;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 0.8px solid #cbd5e1;
            padding-bottom: 1.5mm;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .label-middle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2mm;
            flex: 1;
            padding: 1.5mm 0;
            overflow: hidden;
        }

        .label-artnr {
            font-size: 24pt;
            font-weight: 900;
            color: #000000;
            font-family: 'Arial Black', Impact, sans-serif;
            line-height: 1;
            letter-spacing: -0.5px;
        }

        .label-suffix {
            font-size: 11pt;
            font-weight: bold;
            color: #4a5568;
            border: 1.5px solid #000;
            padding: 0.6mm 1.8mm;
            border-radius: 3px;
            text-transform: uppercase;
            white-space: nowrap;
            transform: rotate(-2deg);
            box-shadow: 1px 1px 0px #000;
            background: #fff;
            max-width: 60%;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .label-bottom-text {
            font-size: 10pt;
            font-weight: 800;
            color: #000000;
            line-height: 1.2;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.4em;
            text-transform: uppercase;
        }

        .label.empty {
            border: 1px dashed #e2e8f0;
            background: #fafafa;
        }
        .label.empty * { display: none !important; }

        @media print {
            @page { size: A4 portrait; margin: 0 !important; }
            html, body { background: white; margin: 0 !important; padding: 0 !important; }
            .main-card, .modal-backdrop, #pwaBanner { display: none !important; }
            #hiddenPrintContainer { display: block !important; }
            .page-container { box-shadow: none !important; margin: 0 !important; transform: none !important; }
            .label { border: 1px solid transparent !important; }
        }

        #hiddenPrintContainer { display: none; }

        .pwa-banner {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #1a4b60;
            color: white;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 9999;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="app-header">
            <div class="app-header-left">
                <img src="logo.png" alt="LAVU Logo" class="app-logo" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'40\' height=\'40\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%231a4b60\' stroke-width=\'2\'><circle cx=\'12\' cy=\'12\' r=\'10\'/><path d=\'M8 14s1.5 2 4 2 4-2 4-2\'/><line x1=\'9\' y1=\'9\' x2=\'9.01\' y2=\'9\'/><line x1=\'15\' y1=\'9\' x2=\'15.01\' y2=\'9\'/></svg>'">

                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>

                        Jetzt Drucken
                    </button>
                    <button class="btn-secondary" onclick="openSettings()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        Optionen
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Restliche unveränderte Struktur für Einstellungen & Preview Modals -->
    <div id="settingsModal" class="modal-backdrop" onclick="closeSettingsViaBackdrop(event)">
        <div class="modal-content">
            <div class="modal-header">
                <span>Druck- & Standorteinstellungen</span>
                <button class="btn-close-x" onclick="closeSettings()">&times;</button>
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label for="inputTop">Standort:</label>
                <select id="inputTop" onchange="updatePreview()">
                    <option value="106 - ASZ Asten" selected>106 - ASZ Asten</option>
                    <option value="ASZ Ansfelden">ASZ Ansfelden</option>
                    <option value="ASZ Enns">ASZ Enns</option>
                </select>
            </div>
            <div class="form-grid" style="margin-bottom: 20px;">
                <div class="form-group">
                    <label for="inputCount">Anzahl Etiketten:</label>
                    <input type="number" id="inputCount" value="21" min="1" max="21" oninput="updatePreview()" />
                </div>
                <div class="form-group">
                    <label for="inputStartPos">Start-Position:</label>
                    <input type="number" id="inputStartPos" value="1" min="1" max="21" oninput="updatePreview()" />
                </div>
            </div>
            <div class="mode-switcher">
                <div id="tabSelect" class="mode-tab active" onclick="switchMode('select')">Sortiment wählen</div>
                <div id="tabInput" class="mode-tab" onclick="switchMode('input')">Datenbank verwalten</div>
            </div>
            <div id="sectionSelect" class="form-section active">
                <div class="form-group" style="margin-bottom: 15px;">
                    <label for="inputSortimentUrl">Zentrale Sortiment-URL:</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="url" id="inputSortimentUrl" value="https://raw.githubusercontent.com/LAVU-OOE/Etiketten-Druckstudio/refs/heads/main/sortiment.json" style="flex: 1;" />
                        <button class="btn-crud" style="background: #27ae60; color: white;" onclick="speichereUndLadeUrl()">Laden</button>
                    </div>
                </div>
                <div id="netzwerkStatus" style="font-size: 0.8rem; color: #7f8c8d; text-align: center; font-style: italic; margin-bottom: 15px;">Status: Lokaler Modus</div>
                <div class="form-grid">
                    <div class="form-group"><label for="inputArtNr">Artikel-Nr.:</label><input type="text" id="inputArtNr" oninput="updatePreview()" /></div>
                    <div class="form-group"><label for="inputSuffix">Zusatztext:</label><input type="text" id="inputSuffix" oninput="updatePreview()" /></div>
                </div>
                <div class="form-group"><label for="inputBezeichnung">Abfallbezeichnung:</label><input type="text" id="inputBezeichnung" oninput="updatePreview()" /></div>
            </div>
            <div id="sectionInput" class="form-section">
                <input type="hidden" id="crudEditIndex" value="-1" />
                <div class="form-grid">
                    <div class="form-group"><label for="crudArtNr">Artikel-Nr.:</label><input type="text" id="crudArtNr" /></div>
                    <div class="form-group"><label for="crudSuffix">Lademittel:</label><input type="text" id="crudSuffix" /></div>
                </div>
                <div class="form-group" style="margin-bottom: 12px;"><label for="crudBez">Abfallbezeichnung:</label><input type="text" id="crudBez" /></div>
                <button class="btn-crud" style="background: #27ae60; color: white; width:100%;" onclick="speichereArtikel()">💾 Artikel speichern</button>
                <button id="btnCancelEdit" class="btn-crud" style="background: #7f8c8d; color: white; display: none;" onclick="clearCrudForm()">Abbrechen</button>
                <div id="crudListContainer" style="max-height: 150px; overflow-y: auto; margin-top:10px;"></div>
            </div>
            <div class="modal-footer">
                <button id="btnSaveDefaults" class="btn-save-defaults" onclick="saveDefaults()">Standard sichern</button>
                <button class="btn-cancel" onclick="closeSettings()">Fertig</button>
            </div>
        </div>
    </div>

    <div id="previewModal" class="modal-backdrop" onclick="closePreviewModalViaBackdrop(event)">
        <div class="modal-content preview-modal-content">
            <div class="modal-header"><span>Interaktiver Druckbogen</span><button class="btn-close-x" onclick="closePreviewModal()">&times;</button></div>
            <div class="modal-body-scroll"><div class="page-container" id="modalPageContainer"><div class="print-sheet" id="labelSheetModal"></div></div></div>
            <div class="modal-footer"><button class="btn-primary" onclick="window.print()">Drucken</button><button class="btn-cancel" onclick="closePreviewModal()">Schließen</button></div>
        </div>
    </div>

    <div id="hiddenPrintContainer"><div class="page-container"><div class="print-sheet" id="labelSheetDirect"></div></div></div>

    <script>
        let defaultSortiment = [
            { artNr: "4040", bez: "Elektro-Kleingeräte (ohne Akku)", zusatzMitte: "QR-Box" },
            { artNr: "4010", bez: "Elektro-Großgeräte", zusatzMitte: "Gitterbox" },
            { artNr: "4020", bez: "Kühlgeräte", zusatzMitte: "Kühlgeräte" },
            { artNr: "4030", bez: "Bildschirmgeräte / TV", zusatzMitte: "TV-Box" },
            { artNr: "1550", bez: "Bauschutt (Kleinmengen)", zusatzMitte: "Mulde" },
            { artNr: "1610", bez: "Altholz (Stofflich)", zusatzMitte: "Holzbox" },
            { artNr: "1620", bez: "Altholz (Thermisch)", zusatzMitte: "Holzbox" }
        ];

        let sortimentData = [];
        let aktuellerModus = 'select'; 
        let aktuellerIndex = 0; // Speichert den aktuell ausgewählten Index des Rades

        window.addEventListener('DOMContentLoaded', async () => {
            loadDefaults();
            let savedUrl = localStorage.getItem('lavu_sortiment_url') || "https://raw.githubusercontent.com/LAVU-OOE/Etiketten-Druckstudio/refs/heads/main/sortiment.json";
            localStorage.setItem('lavu_sortiment_url', savedUrl);
            document.getElementById('inputSortimentUrl').value = savedUrl;
            await loadSortiment();
            updatePreview();
        });

        async function loadSortiment() {
            const url = localStorage.getItem('lavu_sortiment_url');
            if (url) {
                try {
                    const response = await fetch(url, { cache: "no-store" });
                    const data = await response.json();
                    if (Array.isArray(data) && data.length > 0) {
                        sortimentData = data;
                        localStorage.setItem('lavu_studio_sortiment_v8', JSON.stringify(sortimentData));
                        document.getElementById('netzwerkStatus').innerHTML = `🟢 Verbunden mit GitHub`;
                        initWheel();
                        return;
                    }
                } catch (e) {
                    document.getElementById('netzwerkStatus').innerHTML = `⚠️ Lokaler Cache aktiv`;
                }
            }
            const savedSortiment = localStorage.getItem('lavu_studio_sortiment_v8');
            sortimentData = savedSortiment ? JSON.parse(savedSortiment) : [...defaultSortiment];
            initWheel();
        }

        // ============================================================
        // NEUE SELECTION WHEEL LOGIK (Ersetzt initDropdown)
        // ============================================================
        function initWheel() {
            const wheel = document.getElementById('sortimentWheel');
            // Behalte das Overlay-Element beim Leeren
            wheel.innerHTML = '<div class="wheel-overlay-line"></div>';

            sortimentData.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `wheel-item ${index === aktuellerIndex ? 'active' : ''}`;
                itemDiv.textContent = `${item.artNr} - ${item.bez}`;
                itemDiv.setAttribute('data-index', index);
                
                // Klick wechselt direkt zum Element
                itemDiv.addEventListener('click', () => {
                    selectWheelIndex(index);
                });

                wheel.appendChild(itemDiv);
            });

            // Scroll-Event-Listener für automatisches Snapping und Live-Wechsel
            wheel.removeEventListener('scroll', handleWheelScroll);
            wheel.addEventListener('scroll', handleWheelScroll);
            
            // Initial auf das richtige Element scrollen
            setTimeout(() => selectWheelIndex(aktuellerIndex, false), 150);
            renderCrudList();
        }

        let scrollTimeout;
        function handleWheelScroll() {
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                const wheel = document.getElementById('sortimentWheel');
                const items = wheel.querySelectorAll('.wheel-item');
                const wheelCenter = wheel.getBoundingClientRect().left + wheel.clientWidth / 2;
                
                let closestIndex = 0;
                let minDistance = Infinity;

                items.forEach((item, idx) => {
                    const itemCenter = item.getBoundingClientRect().left + item.clientWidth / 2;
                    const distance = Math.abs(wheelCenter - itemCenter);
                    if (distance < minDistance) {
                        minDistance = distance;
                        closestIndex = idx;
                    }
                });

                if (closestIndex !== aktuellerIndex) {
                    aktuellerIndex = closestIndex;
                    items.forEach((item, idx) => {
                        item.classList.toggle('active', idx === aktuellerIndex);
                    });
                    handlePresetSelection(aktuellerIndex);
                }
            }, 60);
        }

        function selectWheelIndex(index, smooth = true) {
            const wheel = document.getElementById('sortimentWheel');
            const items = wheel.querySelectorAll('.wheel-item');
            if (!items[index]) return;

            aktuellerIndex = index;
            items.forEach((item, idx) => item.classList.toggle('active', idx === index));

            const targetItem = items[index];
            const scrollLeftTarget = targetItem.offsetLeft - (wheel.clientWidth / 2) + (targetItem.clientWidth / 2);
            
            wheel.scrollTo({
                left: scrollLeftTarget,
                behavior: smooth ? 'smooth' : 'auto'
            });

            handlePresetSelection(index);
        }

        function handlePresetSelection(index) {
            if (index === undefined) index = aktuellerIndex;
            const item = sortimentData[index];
            if (item) {
                document.getElementById('inputArtNr').value = item.artNr;
                document.getElementById('inputSuffix').value = item.zusatzMitte || "";
                document.getElementById('inputBezeichnung').value = item.bez;
                updatePreview();
            }
        }

        // Restliche unberührte Hilfsfunktionen aus deinem Script
        function switchMode(mode) {
            aktuellerModus = mode;
            document.getElementById('tabSelect').classList.toggle('active', mode === 'select');
            document.getElementById('tabInput').classList.toggle('active', mode === 'input');
            document.getElementById('sectionSelect').classList.toggle('active', mode === 'select');
            document.getElementById('sectionInput').classList.toggle('active', mode === 'input');
        }

        function renderCrudList() {
            const container = document.getElementById('crudListContainer');
            if (!container) return; container.innerHTML = '';
            sortimentData.forEach((item, index) => {
                const row = document.createElement('div'); row.className = 'crud-item-row';
                row.innerHTML = `
                    <div class="crud-item-info"><b>${item.artNr}</b> - ${item.bez}</div>
                    <div style="display:flex; gap:4px;">
                        <button class="btn-crud" style="padding:2px 5px;" onclick="editArtikel(${index})">✏️</button>
                        <button class="btn-crud" style="padding:2px 5px; background:#e74c3c; color:white;" onclick="deleteArtikel(${index})">🗑️</button>
                    </div>`;
                container.appendChild(row);
            });
        }

        function editArtikel(index) {
            const item = sortimentData[index];
            document.getElementById('crudEditIndex').value = index;
            document.getElementById('crudArtNr').value = item.artNr;
            document.getElementById('crudSuffix').value = item.zusatzMitte || "";
            document.getElementById('crudBez').value = item.bez;
            document.getElementById('btnCancelEdit').style.display = 'inline-block';
        }

        function deleteArtikel(index) {
            if (confirm(`Artikel löschen?`)) {
                sortimentData.splice(index, 1);
                localStorage.setItem('lavu_studio_sortiment_v8', JSON.stringify(sortimentData));
                aktuellerIndex = 0;
                initWheel();
            }
        }

        function clearCrudForm() {
            document.getElementById('crudEditIndex').value = "-1";
            document.getElementById('crudArtNr').value = "";
            document.getElementById('crudSuffix').value = "";
            document.getElementById('crudBez').value = "";
            document.getElementById('btnCancelEdit').style.display = 'none';
        }

        function speichereArtikel() {
            const artNr = document.getElementById('crudArtNr').value.trim();
            const zusatzMitte = document.getElementById('crudSuffix').value.trim();
            const bez = document.getElementById('crudBez').value.trim();
            const editIndex = parseInt(document.getElementById('crudEditIndex').value);
            if (!artNr || !bez) return;

            const neuerArtikel = { artNr, bez, zusatzMitte };
            if (editIndex > -1) sortimentData[editIndex] = neuerArtikel;
            else sortimentData.push(neuerArtikel);

            localStorage.setItem('lavu_studio_sortiment_v8', JSON.stringify(sortimentData));
            clearCrudForm();
            initWheel();
        }

        async function speichereUndLadeUrl() {
            const urlInput = document.getElementById('inputSortimentUrl').value.trim();
            localStorage.setItem('lavu_sortiment_url', urlInput);
            await loadSortiment();
        }

        function getAktuelleEingabe() {
            return {
                topText: document.getElementById('inputTop').value,
                artNr: document.getElementById('inputArtNr').value.trim(),
                suffix: document.getElementById('inputSuffix').value.trim(),
                bezeichnung: document.getElementById('inputBezeichnung').value.trim(),
                count: parseInt(document.getElementById('inputCount').value) || 0,
                startPos: parseInt(document.getElementById('inputStartPos').value) || 1
            };
        }

        function updatePreview() {
            const daten = getAktuelleEingabe();
            document.getElementById('sumBezeichnung').textContent = daten.bezeichnung || '-';
            document.getElementById('sumArtNr').textContent = daten.artNr || '-';
            document.getElementById('sumSuffix').textContent = daten.suffix || '-';
            document.getElementById('sumDetails').textContent = `${daten.count}x ab Position ${daten.startPos}`;
            document.getElementById('headerStationText').textContent = daten.topText;

            renderSheetLayout('thumbnailSheet', daten);
            renderSheetLayout('labelSheetModal', daten);
            renderSheetLayout('labelSheetDirect', daten);
        }

        function renderSheetLayout(targetId, daten) {
            const sheet = document.getElementById(targetId);
            if (!sheet) return; sheet.innerHTML = '';
            const maxEtiketten = 21;
            const startIdx = daten.startPos - 1; 
            const endIdx = startIdx + daten.count;

            for (let i = 0; i < maxEtiketten; i++) {
                const labelDiv = document.createElement('div');
                if (i >= startIdx && i < endIdx) {
                    labelDiv.className = 'label';
                    labelDiv.innerHTML = `
                        <div class="label-top">${daten.topText}</div>
                        <div class="label-middle">
                            <div class="label-artnr">${daten.artNr}</div>
                            ${daten.suffix ? `<div class="label-suffix">${daten.suffix}</div>` : ''}
                        </div>
                        <div class="label-bottom-text">${daten.bezeichnung}</div>`;
                } else {
                    labelDiv.className = 'label empty';
                }
                sheet.appendChild(labelDiv);
            }
        }

        function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; renderCrudList(); }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
        function closeSettingsViaBackdrop(e) { if (e.target.id === 'settingsModal') closeSettings(); }
        function openPreviewModal() { document.getElementById('previewModal').style.display = 'flex'; }
        function closePreviewModal() { document.getElementById('previewModal').style.display = 'none'; }
        function closePreviewModalViaBackdrop(e) { if (e.target.id === 'previewModal') closePreviewModal(); }

        function saveDefaults() {
            const defaults = {
                topText: document.getElementById('inputTop').value,
                count: document.getElementById('inputCount').value,
                startPos: document.getElementById('inputStartPos').value,
                sortimentIndex: aktuellerIndex
            };
            localStorage.setItem('lavu_studio_defaults_v8', JSON.stringify(defaults));
        }

        function loadDefaults() {
            const saved = localStorage.getItem('lavu_studio_defaults_v8');
            if (saved) {
                const defaults = JSON.parse(saved);
                if (defaults.sortimentIndex !== undefined) aktuellerIndex = defaults.sortimentIndex;
            }
        }
    </script>
</body>
</html>
